version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: todo_db
    env_file:
      - docker.env
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-postgres}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: todo_api
    ports:
      - "8080:8080"
    env_file:
      - docker.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: